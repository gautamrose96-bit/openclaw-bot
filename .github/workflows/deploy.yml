name: Deploy to All Free Platforms

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install & lint
        run: |
          pip install -r requirements.txt ruff
          ruff check .
      - name: Verify imports
        run: python -c "import config; print('Config OK')"

  deploy-vps:
    needs: lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to VPS (Oracle/GCP)
        if: ${{ secrets.VPS_HOST != '' }}
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/openclaw-bot
            git pull --ff-only || (git fetch origin && git reset --hard origin/main)
            venv/bin/pip install -r requirements.txt -q
            sudo systemctl restart openclaw-bot
            sleep 3
            if systemctl is-active --quiet openclaw-bot; then
              echo "Deploy OK"
            else
              echo "Deploy FAILED - rolling back"
              git checkout HEAD~1
              venv/bin/pip install -r requirements.txt -q
              sudo systemctl restart openclaw-bot
            fi
        continue-on-error: true

  deploy-railway:
    needs: lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Railway
        if: ${{ secrets.RAILWAY_TOKEN != '' }}
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: openclaw-bot
        continue-on-error: true

  deploy-fly:
    needs: lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Fly.io
        if: ${{ secrets.FLY_API_TOKEN != '' }}
        uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        if: ${{ secrets.FLY_API_TOKEN != '' }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        continue-on-error: true

  deploy-koyeb:
    needs: lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Koyeb
        if: ${{ secrets.KOYEB_API_TOKEN != '' }}
        run: |
          curl -s -X POST "https://app.koyeb.com/v1/services/openclaw-bot/redeploy" \
            -H "Authorization: Bearer $KOYEB_API_TOKEN" \
            -H "Content-Type: application/json" || echo "Koyeb redeploy triggered"
        env:
          KOYEB_API_TOKEN: ${{ secrets.KOYEB_API_TOKEN }}
        continue-on-error: true

  deploy-render:
    needs: lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to Render
        if: ${{ secrets.RENDER_DEPLOY_HOOK != '' }}
        run: |
          curl -s -X POST "$RENDER_DEPLOY_HOOK" || echo "Render deploy triggered"
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        continue-on-error: true
