name: Health Check & Auto-Heal (All Platforms)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check all platforms
        run: |
          check_health() {
            local name="$1" url="$2"
            if [ -z "$url" ]; then
              echo "$name: SKIPPED (no URL configured)"
              return
            fi
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$url" --max-time 10 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "$name: HEALTHY"
            else
              echo "$name: DOWN (HTTP $STATUS)"
              echo "${name}_DOWN=true" >> $GITHUB_ENV
            fi
          }

          echo "=== OpenClaw Bot Health Check ==="
          echo ""
          check_health "VPS" "${{ secrets.VPS_HEALTH_URL }}"
          check_health "Koyeb" "${{ secrets.KOYEB_HEALTH_URL }}"
          check_health "Railway" "${{ secrets.RAILWAY_HEALTH_URL }}"
          check_health "Render" "${{ secrets.RENDER_HEALTH_URL }}"
          check_health "Fly" "${{ secrets.FLY_HEALTH_URL }}"
          echo ""
          echo "=== Check Complete ==="

      - name: Auto-restart VPS if down
        if: env.VPS_DOWN == 'true' && secrets.VPS_HOST != ''
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo systemctl restart openclaw-bot
            sleep 5
            systemctl is-active --quiet openclaw-bot && echo "VPS Restarted OK" || echo "VPS Still down"
        continue-on-error: true

      - name: Auto-restart Koyeb if down
        if: env.Koyeb_DOWN == 'true' && secrets.KOYEB_API_TOKEN != ''
        run: |
          curl -s -X POST "https://app.koyeb.com/v1/services/openclaw-bot/redeploy" \
            -H "Authorization: Bearer ${{ secrets.KOYEB_API_TOKEN }}" || true
        continue-on-error: true

      - name: Auto-restart Render if down
        if: env.Render_DOWN == 'true' && secrets.RENDER_DEPLOY_HOOK != ''
        run: curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" || true
        continue-on-error: true
