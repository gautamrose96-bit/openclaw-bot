# Render.com configuration - Free tier
# Connect repo at https://dashboard.render.com/ and it auto-deploys

services:
  - type: worker
    name: openclaw-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python3 bot.py
    plan: free
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: HEALTH_PORT
        value: "8080"
