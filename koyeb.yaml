name: openclaw-bot
type: worker
definition:
  name: openclaw-bot
  type: worker
  instance_types:
    - type: free
  regions:
    - was
  scaling:
    min: 1
    max: 1
  env:
    - key: TELEGRAM_BOT_TOKEN
      value: ""
    - key: GROQ_API_KEY
      value: ""
    - key: HEALTH_PORT
      value: "8080"
  build:
    type: dockerfile
    dockerfile:
      dockerfile: Dockerfile
