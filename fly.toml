# Fly.io configuration - Free tier (3 shared VMs)
# Deploy: fly launch --copy-config && fly secrets set TELEGRAM_BOT_TOKEN=... GROQ_API_KEY=...

app = "openclaw-bot"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  HEALTH_PORT = "8080"

[[services]]
  internal_port = 8080
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
